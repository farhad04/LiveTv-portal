<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FARHAD Live Tv | LIVE TV</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

    <style>
        body { background-color: #050505; color: white; font-family: sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* স্টাইলিশ রেড টাইটেল */
        .brand-name {
            font-family: 'Orbitron', sans-serif;
            color: #ff0000;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.8), 2px 2px 4px #000;
            letter-spacing: 1px;
            font-weight: 900;
            text-transform: uppercase;
        }

        /* আবছা ওয়াটারমার্ক */
        .farhad-watermark {
            position: absolute;
            bottom: 12px;
            right: 18px;
            font-family: 'Orbitron', sans-serif;
            font-size: 9px;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.18); 
            letter-spacing: 2px;
            pointer-events: none;
            z-index: 10;
            text-transform: uppercase;
        }

        .cat-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 800;
            color: #888;
            transition: 0.3s;
            white-space: nowrap;
        }
        .cat-btn.active {
            background: #ff0000;
            color: white;
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.3);
        }
        .channel-card {
            background: #111;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .channel-card:hover { border-color: #ff0000; transform: translateY(-3px); }
        .channel-card img {
            width: 45px; height: 45px;
            object-fit: contain;
            margin: 0 auto 8px;
            border-radius: 8px;
            background: #000;
        }
    
.footer-logo{
text-align:center;
padding:30px 0 40px 0;
font-size:28px;
font-weight:900;
background:linear-gradient(to right,#ff007f,#00f2fe,#4facfe,#ff007f);
background-size:200% auto;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:shine 3s linear infinite;
letter-spacing:2px;
text-transform:uppercase;
}
@keyframes shine{
to{background-position:200% center;}
}

</style>
</head>
<body class="bg-[#050505] text-white">

    <header class="fixed top-0 w-full z-50 bg-black/90 backdrop-blur-md border-b border-white/5">
        <nav class="container mx-auto px-4 h-14 flex items-center justify-between">
             <h1 class="text-base md:text-lg brand-name">Mohadevpur <span class="text-white">Live Tv</span></h1>
            <div class="text-right">
                <div id="clock-time" class="text-red-500 font-mono font-bold text-[11px] md:text-sm">00:00:00 AM</div>
                <div id="clock-date" class="text-[8px] text-zinc-500 uppercase font-bold">Loading...</div>
            </div>
        </nav>
    </header>

    <main class="pt-16 container mx-auto px-4 pb-10">
        <section class="max-w-4xl mx-auto">
            <div class="relative rounded-2xl overflow-hidden bg-black aspect-video border border-white/10 shadow-2xl">
                <video id="video-player" class="w-full h-full" controls autoplay playsinline poster="https://static.vecteezy.com/system/resources/thumbnails/001/826/199/small_2x/progress-loading-bar-buffering-download-upload-and-loading-icon-vector.jpg"></video>
                <div class="farhad-watermark">FARHAD</div>
                <div id="player-loader" class="absolute inset-0 flex flex-col items-center justify-center bg-black/80 hidden">
                    <div class="w-10 h-10 border-4 border-red-600 border-t-transparent rounded-full animate-spin"></div>
                </div>
            </div>
            <div class="mt-4 mb-4 flex gap-2">

    <div class="relative flex-[4]">
        <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500"></i>

        <input
            type="text"
            id="searchInput"
            placeholder="🔍 Search channels..."
            class="w-full bg-zinc-900/80 border border-zinc-700 rounded-2xl pl-12 pr-4 py-3 text-white text-sm outline-none focus:border-red-500"
        >
    </div>

    <div class="flex-[1]">
        <a
            href="https://farhad04.github.io/tv2/"
            class="w-full px-3 py-2 rounded-xl text-xs font-bold whitespace-nowrap flex items-center justify-center"
            style="background:linear-gradient(to right,#ff007f,#00f2fe,#4facfe,#ff007f);color:white;"
        >
            TV 2
        </a>
    </div>

</div>
            <div class="mt-3 flex items-center gap-4 bg-zinc-900/50 p-3 rounded-xl border border-white/5">
                <img id="current-logo" src="https://cdn-icons-png.flaticon.com/512/716/716429.png" class="w-10 h-10 object-contain">
                <div>
                    <h2 id="current-title" class="font-bold text-xs">Select a Channel</h2>
                    <p id="current-cat" class="text-[9px] text-red-500 font-bold uppercase">Streaming</p>
                </div>
                <div class="flex gap-2 mt-2">

<button id="prevBtn"
class="cat-btn flex-1 text-white"
style="background:linear-gradient(45deg,#ff512f,#dd2476);">
⏮ PREV
</button>

<button id="nextBtn"
class="cat-btn flex-1 text-white"
style="background:linear-gradient(45deg,#00c6ff,#0072ff);">
NEXT ⏭
</button>

                </div>
            </div>
        </section>
        <div class="mt-6 flex gap-2 overflow-x-auto no-scrollbar pb-2" id="category-tabs">
            <!-- ক্যাটাগরিগুলো এখানে আসবে -->
        </div>

        <section class="mt-4">
            <div id="status-msg" class="flex flex-col items-center py-20 text-zinc-500">
                <div class="w-8 h-8 border-2 border-red-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                <p class="text-xs uppercase font-bold">Waiting For Live Playlists...</p>
            </div>
            <div id="channel-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
        </section>
    </main>

    <script>
        const KEY_CH = 'farhad_pro_v7_ch';
        const KEY_CAT = 'farhad_pro_v7_cat';
        const proxy = "https://api.codetabs.com/v1/proxy?quest=";

        // আপনার দেওয়া নতুন সব প্লেলিস্ট সোর্স
        const autoSources = [
            { url: "https://raw.githubusercontent.com/farhad04/LiveTv-m3u/refs/heads/main/KB%20Live%20Tv%20121%20Channel%20v1.2.m3u", cat: "Auto" },
            { url: "https://raw.githubusercontent.com/farhad04/LiveTv-m3u/refs/heads/main/fifa.m3u", cat: "FiFa" },
            { url: "https://raw.githubusercontent.com/srhady/Hady/refs/heads/main/akash_live.m3u", cat: "AKASH GO TV" },
            { url: "https://raw.githubusercontent.com/farhad04/AynaOtt/refs/heads/main/Tv1.m3u", cat: "Tv" },
            { url: "https://raw.githubusercontent.com/srhady/SonyLiv/refs/heads/main/sonyliv_playlist.m3u", cat: "SonyLiv" },
            { url: "https://raw.githubusercontent.com/farhad04/LiveTv-m3u/refs/heads/main/Aynaott.m3u", cat: "Ayna ott" },
            { url: "https://raw.githubusercontent.com/farhad04/AynaOtt/refs/heads/main/Bdix.m3u", cat: "Dish" },
            { url: "https://raw.githubusercontent.com/srhady/crichd-speical-live-event/refs/heads/main/playlist.m3u", cat: "Sports" },
        ];

        let allChannels = [];
        let categories = ["All","Favorites"];
        let currentChannelIndex = 0;

        async function fetchAllPlaylists() {
            const cached = localStorage.getItem('cached_channels');

if (cached) {
    allChannels = JSON.parse(cached);
    renderUI();
}
            await Promise.all(
    autoSources.map(async (source) => {
        try {
            const response = await fetch(
                proxy + encodeURIComponent(source.url)
            );

            const data = await response.text();
            parseM3U(data, source.cat);

        } catch (e) {
            console.error("Error loading: " + source.cat);
        }
    })
);
            
            // এডমিন প্যানেলের ম্যানুয়াল চ্যানেলগুলো যোগ করা
            const manualChannels = JSON.parse(localStorage.getItem(KEY_CH)) || [];
            allChannels = [...allChannels, ...manualChannels];
            
            const manualCats = JSON.parse(localStorage.getItem(KEY_CAT)) || [];
            categories = [...new Set([...categories, ...manualCats])];

            localStorage.setItem(
    'cached_channels',
    JSON.stringify(allChannels)
);
            document.getElementById('status-msg').style.display = 'none';
            renderUI();
        }

        function parseM3U(data, defaultCat) {
            const lines = data.split('\n');
            let current = null;
            lines.forEach(line => {
                line = line.trim();
                if (line.startsWith("#EXTINF:")) {
                    const name = line.split(',')[1]?.trim() || "Live TV";
                    const logo = line.match(/tvg-logo="(.*?)"/)?.[1] || "";
                    const group = line.match(/group-title="(.*?)"/)?.[1];

current = {
    name,
    logo,
    category: group || defaultCat
};

if (!categories.includes(group || defaultCat))
    categories.push(group || defaultCat);
                } else if (line.startsWith("http")) {
                    if (current) {
                        current.url = line;
                        allChannels.push(current);
                        current = null;
                    }
                }
            });
        }

        function renderUI() {
            renderCategoryTabs();
            renderChannels(allChannels);
        }

        function renderCategoryTabs() {
            const tabs = document.getElementById('category-tabs');
            tabs.innerHTML = '';
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `cat-btn ${cat === 'All' ? 'active' : ''}`;
                if(cat === 'Favorites'){
    btn.innerText = '⭐ FAVORITES';
    btn.style.background = 'gold';
    btn.style.color = 'black';
} else {
    btn.innerText = cat.toUpperCase();
}
                btn.onclick = () => filterCat(cat, btn);
                tabs.appendChild(btn);
            });
        }

        function renderChannels(list) {
            list = list.filter(
    (channel, index, self) =>
        index === self.findIndex(
            c => c.url === channel.url
        )
);
            const grid = document.getElementById('channel-grid');
            grid.innerHTML = '';
            list.forEach(ch => {
                const div = document.createElement('div');
                div.className = 'channel-card';
                const favorites =
JSON.parse(
localStorage.getItem('favorites')
) || [];

div.innerHTML = `
<div style="position:relative;">

<img src="${ch.logo}"
onerror="this.src='https://cdn-icons-png.flaticon.com/512/716/716429.png'">

<button
onclick="toggleFavorite(event,'${ch.url}')"
style="
position:absolute;
top:-5px;
right:-5px;
background:none;
border:none;
font-size:16px;
cursor:pointer;
z-index:10;">
${favorites.includes(ch.url) ? '⭐' : '☆'}
</button>

<h3 class="text-[9px] font-bold truncate uppercase">
${ch.name}
</h3>

</div>
`;
                div.onclick = () => playStream(ch);
                grid.appendChild(div);
            });
        }

        function playStream(ch) {
            currentChannelIndex = allChannels.findIndex(
    c => c.url === ch.url
);
            const video = document.getElementById('video-player');
            document.getElementById('current-title').innerText = ch.name;
            document.getElementById('current-cat').innerText = ch.category;
            document.getElementById('current-logo').src = ch.logo;
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(ch.url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = ch.url;
                video.play();
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function toggleFavorite(event, url) {

    event.stopPropagation();

    let favorites =
        JSON.parse(
            localStorage.getItem('favorites')
        ) || [];

    if (favorites.includes(url)) {

        favorites =
            favorites.filter(
                item => item !== url
            );

    } else {

        favorites.push(url);

    }

    localStorage.setItem(
        'favorites',
        JSON.stringify(favorites)
    );

    renderChannels(allChannels);
        }
        function filterCat(catName, btn) {
            if (catName === 'Favorites') {

    const favorites =
        JSON.parse(
            localStorage.getItem('favorites')
        ) || [];

    renderChannels(
        allChannels.filter(
            ch => favorites.includes(ch.url)
        )
    );

    return;
            }
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if (catName === 'All') renderChannels(allChannels);
            else renderChannels(allChannels.filter(c => c.category === catName));
        }
    function searchChannels() {
    const query = document.getElementById('searchInput').value.toLowerCase().trim();

    if (query === '') {
        renderChannels(allChannels);
        return;
    }

    const filtered = allChannels.filter(ch =>
        ch.name.toLowerCase().includes(query) ||
        ch.category.toLowerCase().includes(query)
    );

    renderChannels(filtered);
}

        function updateClock() {
            const now = new Date();
            document.getElementById('clock-time').innerText = now.toLocaleTimeString('en-US', { hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.getElementById('clock-date').innerText = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        }

        setInterval(updateClock, 1000);
        updateClock();
        fetchAllPlaylists();

document.getElementById('searchInput')
    .addEventListener('input', searchChannels);
    document.addEventListener('DOMContentLoaded', () => {
    document.addEventListener('keypress', function(e) {
        if (e.key !== 'Enter') return;

        const q = document.getElementById('searchInput')?.value?.toLowerCase();

        if (!q) return;

        const result = allChannels.filter(ch =>
            ch.name.toLowerCase().includes(q)
        );

        if (result.length > 0) {
            playStream(result[0]);
        }
    });
});
        document.getElementById('nextBtn').onclick = () => {

    if(currentChannelIndex < allChannels.length - 1){

        playStream(
            allChannels[currentChannelIndex + 1]
        );

    }

};

document.getElementById('prevBtn').onclick = () => {

    if(currentChannelIndex > 0){

        playStream(
            allChannels[currentChannelIndex - 1]
        );

    }

};
        window.addEventListener('storage', () => location.reload());
    </script>

<div class="footer-logo">MD FARHAD RANA</div>
</body>
</html>
